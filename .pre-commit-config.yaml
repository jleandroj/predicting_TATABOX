repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        # uv.lock pulls in the full torch/cuda dependency tree once [ml] is
        # resolved and comfortably exceeds the 500KB default.
        args: [--maxkb=2000]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        # The mypy hook runs in an isolated env without project deps, so
        # declare anything imported by type-checked code (e.g. pytest in tests).
        additional_dependencies: [pytest]
        args: [--strict]
